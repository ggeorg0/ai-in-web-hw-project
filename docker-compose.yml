networks:
  frontend_net:
    driver: bridge
    ipam:
      config:
        - subnet: "10.10.0.0/16"
  backend_net:
    driver: bridge
    ipam:
      config:
        - subnet: "10.20.0.0/16"

volumes:
  postgres_data:
  redis_data:

services:
  asr-init:
    build:
      context: .
      dockerfile: asr-init/Dockerfile
    container_name: asr-init
    restart: "no"
    volumes:
      - ./converted-models:/models
      - ./GigaAM:/opt/gigaam_repo
    environment:
      - MODEL_TYPE=ctc
      - PYTHONPATH=/opt/gigaam_repo
      - USER_UID=${USER_UID:-1000}
      - USER_GID=${USER_GID:-1000}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    networks:
      - backend_net

  triton:
    build:
      context: .
      dockerfile: triton/Dockerfile
    container_name: triton
    depends_on:
      asr-init:
        condition: service_completed_successfully
    volumes:
      - ./converted-models:/models
      - ./GigaAM:/opt/gigaam_repo
    environment:
      - PYTHONPATH=/opt/gigaam_repo
    ports:
      - "8000:8000"
      - "8001:8001"
      - "8002:8002"
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/v2/health/ready')"]
      interval: 5s
      timeout: 10s
      retries: 30
    command: >
      tritonserver --model-repository=/models --exit-on-error=false
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    networks:
      - backend_net

  vllm:
    image: vllm/vllm-openai:latest
    container_name: vllm
    restart: on-failure
    volumes:
      - ~/.cache/huggingface:/root/.cache/huggingface
    ports:
      - "9000:8000"
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 10s
      retries: 30
    command:
      - "--model"
      - "Qwen/Qwen3-0.6B"
      - "--max-model-len"
      - "2048"
      - "--gpu-memory-utilization"
      - "0.7"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    networks:
      - backend_net

  postgres:
    image: postgres:16
    container_name: postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: grocery_helper
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 2s
      timeout: 5s
      retries: 10
    networks:
      - backend_net

  redis:
    image: redis:7-alpine
    container_name: redis
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 5s
      retries: 10
    networks:
      - backend_net

  frontend:
    build:
      context: ./frontend
    container_name: frontend
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "test -f /run/nginx.pid || exit 1"]
      interval: 3s
      timeout: 5s
      retries: 10
    networks:
      - frontend_net

  nginx:
    image: nginx:latest
    container_name: nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "--timeout=2", "http://localhost/"]
      interval: 5s
      timeout: 5s
      retries: 5
    stop_grace_period: 10s
    networks:
      - frontend_net

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    volumes:
      - ./data:/app/data
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@postgres:5432/grocery_helper
      - REDIS_URL=redis://redis:6379/0
      - TRITON_GRPC_URL=triton:8001
      - TRITON_HTTP_URL=http://triton:8000
      - VLLM_URL=http://vllm:8000
      - DATA_DIR=/app/data
      - LOG_LEVEL=INFO
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/healthz')"]
      interval: 3s
      timeout: 10s
      retries: 15
      start_period: 5s
    stop_grace_period: 30s
    mem_limit: 512m
    cpus: "0.5"
    deploy:
      replicas: 2
    networks:
      - frontend_net
      - backend_net

  celery-worker:
    build:
      context: .
      dockerfile: backend/Dockerfile.worker
    volumes:
      - ./data:/app/data
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@postgres:5432/grocery_helper
      - REDIS_URL=redis://redis:6379/0
      - TRITON_GRPC_URL=triton:8001
      - TRITON_HTTP_URL=http://triton:8000
      - VLLM_URL=http://vllm:8000
      - DATA_DIR=/app/data
      - LOG_LEVEL=INFO
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      triton:
        condition: service_healthy
      vllm:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "celery -A app.celery_worker.celery_app inspect ping -d celery@$$(hostname) 2>/dev/null | grep -q ok"]
      interval: 5s
      timeout: 10s
      retries: 10
      start_period: 10s
    stop_grace_period: 120s
    mem_limit: 2g
    cpus: "1.0"
    deploy:
      replicas: 2
    networks:
      - backend_net

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: unless-stopped
    volumes:
      - ./monitoring/prometheus:/etc/prometheus:ro
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.console.libraries=/usr/share/prometheus/console_libraries"
      - "--web.console.templates=/usr/share/prometheus/consoles"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "--timeout=2", "http://localhost:9090/-/healthy"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend_net

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_SERVER_ROOT_URL: "http://localhost/grafana/"
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "--timeout=2", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - frontend_net
      - backend_net
